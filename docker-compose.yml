version: '3.8'

services:
  postgres-db:
    image: postgres:16
    container_name: bikestore-postgres
    restart: always
    environment:
      POSTGRES_DB: bikestoredb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local