<div class="container py-5" *ngIf="product">
  <div class="row">
    <div class="col-md-6 text-center mb-4">
      <img
        [src]="getImageUrl(product!.pictureUrl)"
        alt="product image"
        class="img-fluid rounded shadow"
        style="max-height: 400px; object-fit: contain;"
      />
    </div>

    <div class="col-md-6">
      <h2 class="mb-3" data-testid="product-name">{{ product!.name }}</h2>
      <h4 data-testid="product-price" class="text-primary mb-3">${{ product!.price }}</h4>

      <p data-testid="product-description" class="mb-4">
        <strong>Description:</strong><br />
        {{ product!.description }}
      </p>

      <ul class="list-group mb-4">
        <li data-testid="product-brand" class="list-group-item"><strong>Brand:</strong> {{ product!.brand }}</li>
        <li data-testid="product-type" class="list-group-item"><strong>Type:</strong> {{ product!.type }}</li>
        <li data-testid="product-stock" class="list-group-item"><strong>In Stock:</strong> {{ product!.quantityInStock }}</li>
      </ul>

      <div class="mb-4">
        <ng-container *ngIf="isInCart$ | async; else addToCartBtn">
          <button
            data-testid="remove-from-cart-btn"
            class="btn btn-outline-danger"
            (click)="removeFromCart()"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash me-1" viewBox="0 0 16 16">
              <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
              <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
            </svg>
            Remove from Cart
          </button>
        </ng-container>
        <ng-template #addToCartBtn>
          <button
            data-testid="add-to-cart-btn"
            class="btn btn-primary"
            [disabled]="product!.quantityInStock === 0"
            (click)="addToCart()"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-cart-plus me-1" viewBox="0 0 16 16">
              <path d="M9 5.5a.5.5 0 0 0-1 0V7H6.5a.5.5 0 0 0 0 1H8v1.5a.5.5 0 0 0 1 0V8h1.5a.5.5 0 0 0 0-1H9V5.5z"/>
              <path d="M.5 1a.5.5 0 0 0 0 1h1.11l.401 1.607 1.498 7.985A.5.5 0 0 0 4 12h1a2 2 0 1 0 0 4 2 2 0 0 0 0-4h7a2 2 0 1 0 0 4 2 2 0 0 0 0-4h1a.5.5 0 0 0 .491-.408l1.5-8A.5.5 0 0 0 14.5 3H2.89l-.405-1.621A.5.5 0 0 0 2 1H.5zM6 14a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm7 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm-1.646-7.646-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 0 1 .708-.708L8 8.293l2.646-2.647a.5.5 0 0 1 .708.708z"/>
            </svg>
            {{ product!.quantityInStock === 0 ? 'Out of Stock' : 'Add to Cart' }}
          </button>
        </ng-template>
      </div>

      <button class="btn btn-outline-primary ms-2" data-bs-toggle="modal" data-bs-target="#editProductModal">
        Edit
      </button>
      <button class="btn btn-outline-danger ms-2" (click)="deleteProduct()">
      Delete
    </button>
    </div>
  </div>

  <!-- Edit Product Modal -->
  <div class="modal fade" id="editProductModal" tabindex="-1" aria-labelledby="editProductModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="editProductModalLabel">Edit Product</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <form>
          <div class="mb-3">
            <label for="name">Name</label>
            <input [(ngModel)]="product!.name" name="name" id="name" class="form-control" />
          </div>

          <div class="mb-3">
            <label for="description">Description</label>
            <textarea [(ngModel)]="product!.description" name="description" id="description" class="form-control"></textarea>
          </div>

          <div class="mb-3">
            <label for="price">Price</label>
            <input type="number" [(ngModel)]="product!.price" name="price" id="price" class="form-control" />
          </div>

                  <div class="mb-3">
            <label for="brand">Brand</label>
            <select [(ngModel)]="product!.brand" name="brand" id="brand" class="form-select">
              <option *ngFor="let brand of brands" [value]="brand">{{ brand }}</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="type">Type</label>
            <select [(ngModel)]="product!.type" name="type" id="type" class="form-select">
              <option *ngFor="let type of types" [value]="type">{{ type }}</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="quantity">Quantity In Stock</label>
            <input type="number" [(ngModel)]="product!.quantityInStock" name="quantity" id="quantity" class="form-control" />
          </div>

          <div class="mb-3">
            <label for="image">Change Image (optional)</label>
            <input type="file" (change)="onFileSelected($event)" id="image" class="form-control" accept="image/*" />
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-success" (click)="saveChanges()" data-bs-dismiss="modal">Save Changes</button>
      </div>
    </div>
  </div>
  </div>
</div>
