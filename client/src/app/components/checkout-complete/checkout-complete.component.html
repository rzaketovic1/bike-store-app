<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6 text-center">

      <!-- Success icon -->
      <div class="mb-4" data-testid="checkout-complete-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor" class="bi bi-check-circle-fill text-success" viewBox="0 0 16 16">
          <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
        </svg>
      </div>

      <!-- Heading -->
      <h2 class="fw-bold mb-3" data-testid="checkout-complete-heading">Order Placed Successfully!</h2>

      <!-- Confirmation text -->
      <p class="text-muted mb-2 fs-5" data-testid="checkout-complete-message">
        Thank you for your order. We've received your request and will process it shortly.
      </p>
      <p class="text-muted mb-5" data-testid="checkout-complete-subtext">
        A confirmation will be sent to your email address. You can continue browsing while we prepare your bikes.
      </p>

      <!-- Continue Shopping -->
      <button
        class="btn btn-primary btn-lg px-5"
        data-testid="continue-shopping-btn"
        (click)="continueShopping()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-bicycle me-2" viewBox="0 0 16 16">
          <path d="M4 4.5a.5.5 0 0 1 .5-.5H6a.5.5 0 0 1 0 1v.5h4.14l.386-1.158A.5.5 0 0 1 11 4h1a.5.5 0 0 1 0 1h-.64l-.311.935.807 1.143-.628.885-1.073-1.52A4 4 0 0 1 8 12a4 4 0 0 1-4-4 4 4 0 0 1 .72-2.29L5.5 6.5H5v.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5h.5zm2.5 6a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm5.5 0a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm0-4.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm-9 0a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z"/>
        </svg>
        Continue Shopping
      </button>

    </div>
  </div>
</div>
